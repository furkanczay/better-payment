name: Publish to NPM (Manual)

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (do not actually publish)'
        required: false
        default: 'false'
        type: boolean

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        working-directory: packages/better-payment
        run: pnpm test

      - name: Run linter
        working-directory: packages/better-payment
        run: pnpm lint

      - name: Build package
        working-directory: packages/better-payment
        run: pnpm build

      - name: Publish to NPM
        if: ${{ inputs.dry_run == false || inputs.dry_run == 'false' }}
        working-directory: packages/better-payment
        run: pnpm publish --access public --provenance --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Dry run publish
        if: ${{ inputs.dry_run == true || inputs.dry_run == 'true' }}
        working-directory: packages/better-payment
        run: pnpm publish --access public --provenance --no-git-checks --dry-run
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
